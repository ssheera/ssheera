<svg xmlns="http://www.w3.org/2000/svg" width="600" height="22" viewBox="0 0 600 22">
  <defs>
    <linearGradient id="fade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#EA4335" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#EA4335" stop-opacity="0.5"/>
      <stop offset="0.6" stop-color="#EA4335" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#EA4335" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <line x1="0" y1="11" x2="600" y2="11" stroke="url(#fade)" stroke-width="1.5"/>
  <circle cx="300" cy="11" r="4" fill="#EA4335">
    <animate attributeName="opacity" values="1;0.45;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="11" r="4" fill="none" stroke="#EA4335" stroke-width="1">
    <animate attributeName="r" values="4;14;4" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
