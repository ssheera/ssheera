<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" preserveAspectRatio="xMidYMid slice" role="img" aria-label="sunny">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0a0e27"/>
      <stop offset="32%"  stop-color="#3b0764"/>
      <stop offset="55%"  stop-color="#9d174d"/>
      <stop offset="75%"  stop-color="#ea580c"/>
      <stop offset="92%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#fffbeb" stop-opacity="1"/>
      <stop offset="35%"  stop-color="#fde68a" stop-opacity="0.95"/>
      <stop offset="70%"  stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fffbeb"/>
      <stop offset="55%"  stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#sky)"/>
  <circle cx="980" cy="295" r="260" fill="url(#sunGlow)"/>
  <circle cx="980" cy="295" r="78" fill="url(#sunCore)">
    <animate attributeName="r" values="76;80;76" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.92;1;0.92" dur="7s" repeatCount="indefinite"/>
  </circle>
  <line x1="0" y1="305" x2="1280" y2="305" stroke="#fef3c7" stroke-opacity="0.15" stroke-width="1"/>
  <text x="80" y="200" font-family="ui-serif, Georgia, 'Times New Roman', serif" font-size="148" font-weight="300" fill="#fef3c7" letter-spacing="-3">sunny</text>
</svg>
