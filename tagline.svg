<svg xmlns="http://www.w3.org/2000/svg" width="640" height="120" viewBox="0 0 640 120">
  <style>
    .role {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: 600;
      font-size: 24px;
      letter-spacing: 9px;
      fill: #C9D1D9;
    }
    .stack {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 6px;
      fill: #8B949E;
    }
    .status {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: 500;
      font-size: 10px;
      letter-spacing: 5px;
      fill: #8B949E;
    }
    .dot-red { fill: #EA4335; font-weight: 700; }
    .dot-green { fill: #3FB950; }
  </style>
  <text x="320" y="36" text-anchor="middle" class="role">FULL-STACK ENGINEER</text>
  <line x1="245" y1="48" x2="395" y2="48" stroke="#30363D" stroke-width="1"/>
  <text x="320" y="74" text-anchor="middle" class="stack">JAVA<tspan class="dot-red" dx="8">·</tspan><tspan dx="8">TYPESCRIPT</tspan><tspan class="dot-red" dx="8">·</tspan><tspan dx="8">PYTHON</tspan></text>
  <text x="320" y="102" text-anchor="middle" class="status">LONDON<tspan dx="14" class="dot-green" font-size="14">●<animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></tspan><tspan dx="14">OPEN TO OPPORTUNITIES</tspan></text>
</svg>
