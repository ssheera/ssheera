<svg xmlns="http://www.w3.org/2000/svg" width="640" height="120" viewBox="0 0 640 120">
  <defs>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0F6FC"/>
      <stop offset="0.5" stop-color="#C9D1D9"/>
      <stop offset="1" stop-color="#8B949E"/>
    </linearGradient>
  </defs>
  <style>
    .role {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: 600;
      font-size: 24px;
      letter-spacing: 9px;
    }
    .stack {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 6px;
      fill: #8B949E;
    }
    .status {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: 500;
      font-size: 10px;
      letter-spacing: 5px;
      fill: #8B949E;
    }
    .dot-red { fill: #EA4335; font-weight: 700; }
  </style>
  <text x="320" y="36" text-anchor="middle" class="role" fill="url(#sheen)">FULL-STACK ENGINEER</text>
  <line x1="245" y1="48" x2="395" y2="48" stroke="#30363D" stroke-width="1"/>
  <circle cx="245" cy="48" r="2" fill="#EA4335">
    <animate attributeName="cx" values="245;395;245" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="5s" repeatCount="indefinite"/>
  </circle>
  <text x="320" y="74" text-anchor="middle" class="stack">JAVA<tspan class="dot-red" dx="8">·</tspan><tspan dx="8">TYPESCRIPT</tspan><tspan class="dot-red" dx="8">·</tspan><tspan dx="8">PYTHON</tspan></text>

  <text x="222" y="106" text-anchor="end" class="status">LONDON</text>
  <circle cx="240" cy="102" r="3.5" fill="#3FB950">
    <animate attributeName="opacity" values="1;0.45;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="102" r="3.5" fill="none" stroke="#3FB950" stroke-width="1">
    <animate attributeName="r" values="3.5;14;3.5" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <text x="258" y="106" text-anchor="start" class="status">OPEN TO OPPORTUNITIES</text>
</svg>
